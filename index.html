<!DOCTYPE html>
<html lang="en">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Fighter Game">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GSGW Cheerful ThemePark</title>
   
  

    <script src="js/utilities.js" defer></script>

    <script src="js/classes.js" defer></script>
    
    <script src="script.js" defer></script>

    

    <style>
        * {
            box-sizing: border-box;
                
            font-family: "Press Start 2P", system-ui;
            font-weight: 400;
            font-style: normal;

        }
    </style>
</head>

<body>
    <!-- big screen container div -->
    <div style="position: relative; display: inline-block;">
        <!-- smaller status container div -->
        <div style="
            position: absolute; 
            display: flex; 
            width: 100%; 
            align-items: center;
            padding: 20px;
            
        ">

            <!-- player health -->
            <div style="position: relative;  width: 100%;">
                <div  style="background-color: rgb(231, 73, 73); height: 30px; width: 100%;"></div>
                <div id="playerHealth" style="
                    position: absolute; 
                    background: #4b004f; 
                    top: 0; 
                    right: 0; 
                    left: 0; 
                    bottom: 0;
                    border-top: 4px solid rgb(89, 184, 171);
                    border-left: 4px solid rgb(89, 184, 171);
                    border-bottom: 4px solid rgb(89, 184, 171);
                    
                    "></div>
            </div>

            <!-- timer -->
            <div id="timer" style="
                background-color: rgb(13, 100, 116); 
                color: aliceblue;
                height: 50px; 
                width: 100px; 
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 4px solid rgb(89, 184, 171);
            "> 5 </div>

            <!-- enemy health -->
            <div style="position: relative;  width: 100%;">
                <div  style="background-color: rgb(231, 73, 73); height: 30px; width: 100%;"></div>
                <div id="enemyHealth" style="
                    position: absolute; 
                    background: #4b004f; 
                    top: 0; 
                    right: 0; 
                    left: 0; 
                    bottom: 0;
                    border-top: 4px solid rgb(89, 184, 171);
                    border-right: 4px solid rgb(89, 184, 171);
                    border-bottom: 4px solid rgb(89, 184, 171);
                    "></div>
            </div>
            

        </div>
        <div id="displayText"
        style="
            position: absolute; 
            color: rgb(3, 28, 36); 
            display: none; 
            align-items: center; 
            justify-content: center;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;

            
        "> Tie
        
        </div>
  
        <canvas></canvas>
    </div>

</body>



</html>
